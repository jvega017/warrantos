name: release

# Tag-triggered release. Push a tag like v0.9.0b1 to build, create a GitHub
# Release with the artefacts, and publish to PyPI via OIDC Trusted Publishing.
#
# One-time setup before the first tag (maintainer):
#   1. Register the project name on PyPI (pypi.org/manage/account/publishing/)
#      as a Trusted Publisher: owner jvega017, repo claude-provenance,
#      workflow release.yml, environment pypi.
#   2. Create a GitHub Environment named "pypi".
# No API token is stored anywhere; the OIDC exchange handles authentication.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build and validate
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - name: Create the GitHub Release with artefacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          generate_release_notes: true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/*

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for Trusted Publishing
      contents: read
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI (Trusted Publishing, no stored token)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
