name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  # Opt the SHA-pinned Node20 actions into the Node24 runtime now (GitHub's
  # documented opt-in for the 2026-06-16 forced migration). This clears the
  # Node20 deprecation WITHOUT unpinning the security-critical action SHAs:
  # the pins stay; only the JS runtime they execute under changes.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Lint GitHub Actions
        shell: bash
        run: |
          npm install -g @mheap/actionlint
          actionlint -oneline

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Test on all three platforms. Windows is not optional: the 0.9.3
        # cp1252 unicode crash shipped because CI was Linux-only and never
        # exercised the Windows console encoding path. macOS is cheap extra
        # coverage for path and encoding quirks.
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Minimum supported Python is 3.11 (the codebase uses 3.11+ features; 3.8-3.10 are EOL/near-EOL).
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run the suite (stdlib only, nothing to install)
        shell: bash
        run: python -m unittest discover -s tests -v
        env:
          # Ensure tests are hermetic: no external Claude CLI or API keys
          CLAUDE_HOME: ""
          ANTHROPIC_API_KEY: ""
          PROVENANCE_GRADER: ""
      - name: Smoke-test the evaluation harness (offline, must exit 0)
        shell: bash
        run: python eval/run_eval.py
        env:
          # Ensure evaluation runs without external tools
          CLAUDE_HOME: ""
          ANTHROPIC_API_KEY: ""
      - name: Smoke-test the four-verdict gallery (thesis demo, must exit 0)
        shell: bash
        run: python tools/run_gallery.py
        env:
          # Ensure gallery runs without external tools
          CLAUDE_HOME: ""
          ANTHROPIC_API_KEY: ""

  # The signing tests SKIP without the optional extra. Run them at least once
  # with [attestation] installed so the Ed25519 path is actually exercised.
  attestation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install the attestation extra and run the suite
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[attestation]"
          python -m unittest discover -s tests -v
        env:
          # Ensure tests are hermetic: no external Claude CLI or API keys
          CLAUDE_HOME: ""
          ANTHROPIC_API_KEY: ""
          PROVENANCE_GRADER: ""

  # Packaging gate: build the wheel and sdist, validate metadata, and prove a
  # clean install works with all console entry points. Catches packaging
  # regressions before a release rather than at publish time.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Validate package metadata
        run: python -m twine check dist/*
      - name: Clean-venv install and entry-point smoke test
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/python -m pip install dist/*.whl
          /tmp/venv/bin/warrantos status >/dev/null
          /tmp/venv/bin/python -c "from warrantos import provenance, cli, hooks; print('packages import')"
      - name: Upload built artefacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/*
