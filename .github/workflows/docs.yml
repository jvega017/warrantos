name: docs

# Build the MkDocs Material site and deploy it to GitHub Pages on every push
# to main. Requires the repository's Pages source to be set to "GitHub
# Actions" (Settings > Pages) before the first run.
#
# SHA pins for actions/checkout and actions/setup-python are copied verbatim
# from ci.yml / release.yml to keep one pin per action across the repo. The
# three Pages-specific actions (configure-pages, upload-pages-artifact,
# deploy-pages) are new to this repo: pinned here to the commit SHA behind
# each action's current latest major-version tag, resolved via
# `git ls-remote --tags` against the upstream repo (verified this session,
# not previously used elsewhere in this repo, so not yet exercised by a run).

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Same Node20-to-Node24 opt-in as ci.yml / release.yml; does not affect the
  # SHA pins, only the JS runtime the pinned actions execute under.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install MkDocs Material
        run: python -m pip install --upgrade pip mkdocs-material
      - name: Build the site
        run: mkdocs build
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
